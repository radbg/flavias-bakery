<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#5F56AF">
  <meta name="description" content="Gestión de ventas para Flavia's Bakery">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Flavia's">

  <title>Flavia's Bakery</title>

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/styles.css">

  <!-- Estilos para formas de pago y vista Zelle -->
  <style>
    /* ── Botones de forma de pago ── */
    .payment-methods {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 4px;
    }
    .payment-btn {
      padding: 10px 4px;
      border: 2px solid var(--border, #e0e0e0);
      border-radius: 12px;
      background: var(--white, #fff);
      color: var(--text, #333);
      font-size: 0.72rem;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      line-height: 1.4;
      transition: all 0.15s;
    }
    .payment-btn.active {
      border-color: #5F56AF;
      background: #5F56AF;
      color: #fff;
    }

    /* ── Panel pago mixto ── */
    #split-payment {
      background: var(--purple-bg, #F0EEF8);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 14px;
    }
    .split-cols {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      align-items: center;
    }
    .split-col {
      display: flex;
      flex-direction: column;
      gap: 6px;
      text-align: center;
    }
    .split-col-total {
      background: #fff;
      border-radius: 10px;
      padding: 8px 4px;
    }
    .split-label {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-light, #777);
    }
    .split-input {
      text-align: center;
      font-size: 1rem;
      font-weight: 700;
      padding: 8px 6px !important;
    }
    .split-value {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text, #333);
    }
    .split-value-total {
      font-size: 1.1rem;
      color: #5F56AF;
    }

    /* ── Detalle pago mixto en modal ── */
    .detail-mixto-row {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-light, #777);
      margin-bottom: 10px;
    }

    /* ── Tag de pago en historial ── */
    .payment-tag {
      color: var(--text-muted, #888);
      font-size: 0.75rem;
    }

    /* ── Badge de pago en detalle modal ── */
    .detail-payment-badge {
      display: inline-block;
      background: #5F56AF18;
      color: #5F56AF;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.82rem;
      font-weight: 600;
      margin-bottom: 12px;
    }

    /* ── Vista Zelle ── */
    .zelle-summary-card {
      background: linear-gradient(135deg, #5F56AF, #4F46A0);
      color: #fff;
      border-radius: 16px;
      padding: 16px 12px;
      margin: 0 0 16px 0;
    }
    .zelle-summary-cols {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 4px;
      text-align: center;
    }
    .zelle-summary-col {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .zelle-summary-label {
      font-size: 0.72rem;
      opacity: 0.8;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .zelle-summary-amount {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    /* ── Encabezado de sección dentro de Zelle ── */
    .zelle-section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 4px 6px;
      margin-bottom: 6px;
      border-bottom: 2px solid var(--border, #e0e0e0);
    }
    .zelle-section-title {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text, #333);
    }
    .zelle-add-btn {
      background: #5F56AF;
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
    }
    .zelle-add-btn:active { opacity: 0.8; }

    /* ── Formulario inline de gasto ── */
    #zelle-add-form {
      background: var(--surface, #f8f8f8);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .zelle-form-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .ze-save-btn {
      padding: 8px 14px !important;
      font-size: 0.82rem !important;
      white-space: nowrap;
    }
    .ze-cancel-btn {
      padding: 8px 10px !important;
      font-size: 0.82rem !important;
    }

    /* ── Filas de gastos Zelle ── */
    .zelle-expense-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 8px;
      border-radius: 10px;
      margin-bottom: 4px;
      background: var(--white, #fff);
      border: 1px solid var(--border, #e8e8e8);
    }
    .zelle-expense-left {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .zelle-expense-date {
      font-size: 0.72rem;
      color: var(--text-muted, #888);
      text-transform: capitalize;
    }
    .zelle-expense-desc {
      font-size: 0.88rem;
      color: var(--text, #333);
      font-weight: 500;
    }
    .zelle-expense-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .zelle-expense-amount {
      font-size: 0.95rem;
      font-weight: 700;
      color: #e05a5a;
    }
    .zelle-expense-del {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      padding: 4px;
      border-radius: 6px;
      opacity: 0.6;
    }
    .zelle-expense-del:hover, .zelle-expense-del:active { opacity: 1; }
    .zelle-expenses-empty {
      color: var(--text-muted, #888);
      font-size: 0.85rem;
      text-align: center;
      padding: 12px 0;
    }

    /* ── Filas de ventas Zelle ── */
    .zelle-day-group {
      margin-bottom: 16px;
    }
    .zelle-day-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 4px;
      border-bottom: 1px solid var(--border, #e0e0e0);
      margin-bottom: 6px;
    }
    .zelle-day-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted, #888);
      text-transform: capitalize;
    }
    .zelle-day-total {
      font-size: 0.85rem;
      font-weight: 700;
      color: #5F56AF;
    }

    .zelle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 8px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.1s;
      margin-bottom: 4px;
    }
    .zelle-row:hover, .zelle-row:active {
      background: var(--surface-hover, #f5f5f5);
    }
    .zelle-row-left {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .zelle-time {
      font-size: 0.75rem;
      color: var(--text-muted, #888);
    }
    .zelle-items {
      font-size: 0.85rem;
      color: var(--text, #333);
    }
    .zelle-note {
      font-size: 0.75rem;
      color: var(--text-muted, #888);
      font-style: italic;
    }
    .zelle-amount {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text, #333);
    }
  </style>

  <!-- External libs (cargadas primero) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>

  <!-- Pantalla de login -->
  <div id="login-screen">
    <div id="login-card">
      <img src="icons/logo.png" alt="Flavia's Bakery" id="login-logo">
      <div id="login-error" class="login-error" style="display:none"></div>

      <div id="login-form">
        <input type="email"    id="login-email"    class="form-input" placeholder="Correo electrónico" autocomplete="email">
        <input type="password" id="login-password" class="form-input" placeholder="Contraseña" autocomplete="current-password">
        <button class="btn btn-primary btn-full" id="login-btn">Entrar</button>
        <button class="btn btn-ghost btn-full" id="forgot-btn">Olvidé mi contraseña</button>
        <button class="btn btn-ghost btn-full" id="show-register-btn">Crear cuenta nueva</button>
      </div>

      <div id="register-form" style="display:none">
        <input type="email"    id="reg-email"     class="form-input" placeholder="Correo electrónico" autocomplete="email">
        <input type="password" id="reg-password"  class="form-input" placeholder="Contraseña (mínimo 6 caracteres)" autocomplete="new-password">
        <input type="password" id="reg-password2" class="form-input" placeholder="Repetir contraseña" autocomplete="new-password">
        <button class="btn btn-primary btn-full" id="register-btn">Crear cuenta</button>
        <button class="btn btn-ghost btn-full" id="show-login-btn">Ya tengo cuenta</button>
      </div>
    </div>
  </div>

  <div id="install-banner">
    <span>📱 Instala la app para usar offline</span>
    <button id="install-do">Instalar</button>
    <button id="install-dismiss">✕</button>
  </div>

  <div id="app">
    <header id="app-header">
      <img src="icons/logo.png?v=2" alt="Flavia's Bakery" id="app-logo">
    </header>
    <main id="main-content" role="main"></main>
    <nav id="bottom-nav" role="navigation" aria-label="Navegación principal"></nav>
  </div>

  <!-- App scripts en orden de dependencia -->
  <script src="js/firebase-config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/calculations.js"></script>
  <script src="js/components/toast.js"></script>
  <script src="js/components/modal.js"></script>
  <script src="js/components/nav.js"></script>
  <script src="js/views/dashboard.js"></script>
  <script src="js/views/register-sale.js"></script>
  <script src="js/views/history.js"></script>
  <script src="js/views/catalog.js"></script>
  <script src="js/views/expenses.js"></script>
  <script src="js/views/monthly-report.js"></script>
  <script src="js/views/zelle.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
