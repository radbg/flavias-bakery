<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#5F56AF">
  <meta name="description" content="Gestión de ventas para Flavia's Bakery">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Flavia's">

  <title>Flavia's Bakery</title>

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/styles.css">

  <!-- External libs (cargadas primero) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>

  <!-- Pantalla de login -->
  <div id="login-screen">
    <div id="login-card">
      <img src="icons/logo.png" alt="Flavia's Bakery" id="login-logo">
      <div id="login-error" class="login-error" style="display:none"></div>

      <div id="login-form">
        <input type="email"    id="login-email"    class="form-input" placeholder="Correo electrónico" autocomplete="email">
        <input type="password" id="login-password" class="form-input" placeholder="Contraseña" autocomplete="current-password">
        <button class="btn btn-primary btn-full" id="login-btn">Entrar</button>
        <button class="btn btn-ghost btn-full" id="show-register-btn">Crear cuenta nueva</button>
      </div>

      <div id="register-form" style="display:none">
        <input type="email"    id="reg-email"     class="form-input" placeholder="Correo electrónico" autocomplete="email">
        <input type="password" id="reg-password"  class="form-input" placeholder="Contraseña (mínimo 6 caracteres)" autocomplete="new-password">
        <input type="password" id="reg-password2" class="form-input" placeholder="Repetir contraseña" autocomplete="new-password">
        <button class="btn btn-primary btn-full" id="register-btn">Crear cuenta</button>
        <button class="btn btn-ghost btn-full" id="show-login-btn">Ya tengo cuenta</button>
      </div>
    </div>
  </div>

  <div id="install-banner">
    <span>📱 Instala la app para usar offline</span>
    <button id="install-do">Instalar</button>
    <button id="install-dismiss">✕</button>
  </div>

  <div id="app">
    <header id="app-header">
      <img src="icons/logo.png?v=2" alt="Flavia's Bakery" id="app-logo">
    </header>
    <main id="main-content" role="main"></main>
    <nav id="bottom-nav" role="navigation" aria-label="Navegación principal"></nav>
  </div>

  <!-- App scripts en orden de dependencia -->
  <script src="js/firebase-config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/calculations.js"></script>
  <script src="js/components/toast.js"></script>
  <script src="js/components/modal.js"></script>
  <script src="js/components/nav.js"></script>
  <script src="js/views/dashboard.js"></script>
  <script src="js/views/register-sale.js"></script>
  <script src="js/views/history.js"></script>
  <script src="js/views/catalog.js"></script>
  <script src="js/views/expenses.js"></script>
  <script src="js/views/monthly-report.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
